services:
  db:
    image: postgres:16
    container_name: bookinghub_db
    environment:
      POSTGRES_DB: bookinghub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: luisneto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: python:3.12
    container_name: bookinghub_api
    working_dir: /app
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: sh -c "pip install fastapi uvicorn psycopg2-binary && uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata: